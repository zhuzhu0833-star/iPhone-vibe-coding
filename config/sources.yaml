# Government, immigration, and university sources (English only).
# Uses official RSS where reliable; Google News RSS (site:domain) for universities
# and regions where direct feeds are unavailable or blocked.

settings:
  max_items_per_source: 5
  max_items_per_country: 2
  max_total_items: 12
  lookback_hours: 168

countries:
  - id: us
    name: United States
    flag: "🇺🇸"
    sources:
      - name: USCIS (Google News)
        type: immigration
        url: "https://news.google.com/rss/search?q=site:uscis.gov+student+OR+visa+OR+immigration&hl=en-US&gl=US&ceid=US:en"
      - name: Study in the States
        type: education
        url: "https://news.google.com/rss/search?q=site:studyinthestates.dhs.gov+international+student&hl=en-US&gl=US&ceid=US:en"
