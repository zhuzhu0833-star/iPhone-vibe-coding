# Content filter and ranking weights.
# Priority order: university admissions > post-graduation work rights > immigration policy.

# At least one required match (case-insensitive) for non-immigration sources.
required_any:
  - admission
  - admissions
  - enrolment
  - enrollment
  - intake
  - tuition
  - scholarship
  - entry requirement
  - application deadline
  - offer
  - international student
  - international students
  - overseas student
  - foreign student
  - english-taught
  - english taught
  - english programme
  - english program
  - visa
  - permit
  - student visa
  - study visa
  - student permit
  - immigration
  - visa policy
  - work permit
  - work right
  - post-study
  - post study
  - post-graduation
  - graduate route
  - graduate visa
  - opt
  - psw
  - pgwp
  - post-study work
  - right to work
  - working rights
  - employment after graduation

# High-priority: university admissions and enrollment policy.
admissions_priority:
  - admission policy
  - admissions policy
  - admission requirement
  - admissions requirement
  - entry requirement
  - application deadline
  - application open
  - enrolment policy
  - enrollment policy
  - tuition fee
  - tuition increase
  - tuition reduction
  - scholarship
  - bursary
  - financial aid
  - intake
  - places available
  - offer holder
  - conditional offer
  - clearing
  - international student
  - international students
  - overseas applicant
  - english-taught
  - english taught

# Lower-priority immigration-only signals (still included, ranked lower).
immigration_only:
  - visa processing time
  - visa fee
  - visa application
  - immigration raid
  - detained
  - sentenced
  - charged
  - form i-
  - case status
  - biometrics

# Source-type base bonus (higher = more likely to appear in digest).
source_type_bonus:
  university: 35
  education: 20
  immigration: 5

# Extra score per matched term.
priority_boost:
  - policy change
  - new rule
  - updated guidance
  - announced
  - effective
  - tuition
  - admission
  - admissions
  - scholarship
  - intake
  - english-taught

# Penalty per matched term for immigration-heavy noise.
immigration_penalty:
  - processing time
  - case status
  - form i-
  - biometrics appointment
  - fraud
  - sentenced
  - charged

# Netherlands-only extra requirement.
netherlands_extra_any:
  - international student
  - international students
  - english-taught
  - english taught
  - english programme
  - english program
  - english degree
  - non-eu student
  - non-eu students

exclude_any:
  - sports
  - football
  - basketball
  - concert
  - festival
  - obituary
  - alumni reunion
  - wedding
  - cookbook
  - recipe
  - sentenced to
  - charged for
  - charged with
  - convicted of
  - arrested for
