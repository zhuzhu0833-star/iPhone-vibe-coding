name: Deploy Admin Panel

# Admin saves trigger pages-deploy.yml via push to data/selections.json.
# This workflow is kept for manual redeploy only.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/pages-deploy.yml
    permissions:
      contents: read
      actions: write
      pages: write
      id-token: write
