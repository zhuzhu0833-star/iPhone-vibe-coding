name: Deploy Admin Panel

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - "data/catalog.json"
      - "data/selections.json"
      - ".github/workflows/deploy-admin.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site/data
          cp admin/index.html admin/app.js admin/style.css _site/
          cp data/catalog.json data/selections.json _site/data/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
